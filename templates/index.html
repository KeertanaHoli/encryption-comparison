<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparative Study of File Encryption</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .main-title {
            color: white;
            text-align: center;
            padding: 30px 20px;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .nav-buttons {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-buttons .btn {
            margin: 0 10px;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        
        .nav-buttons .btn-outline-light {
            border: 2px solid white;
        }
        
        .nav-buttons .btn-outline-light:hover {
            background-color: white;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }
        
        .nav-buttons .btn-outline-light:active {
            transform: translateY(0);
        }
        
        .nav-buttons .btn-light {
            background-color: white;
            color: #667eea;
            border: none;
            box-shadow: 0 3px 10px rgba(255, 255, 255, 0.2);
        }
        
        .nav-buttons .btn-light:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.4);
        }
        
        .content-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .card-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .crypto-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .crypto-card h3 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 10px 15px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.15s ease;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }
        
        .alert {
            border-radius: 10px;
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .card-container {
                grid-template-columns: 1fr;
            }
            
            .main-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-title">
        Comparative Study of File Encryption and Decryption Using AES-256 GCM,<br>
        Ascon-128a and ChaCha20-Poly1305
    </div>
    
    <div class="nav-buttons">
        <button class="btn btn-light" onclick="location.href='/'">Encrypt/Decrypt</button>
        <button class="btn btn-outline-light" onclick="location.href='/benchmark'">Benchmark</button>
        <button class="btn btn-outline-light" onclick="location.href='/ledger'">Blockchain Ledger</button>
    </div>
    
    <div class="content-container">
        <div class="card-container">
            <div class="crypto-card">
                <h3>Encrypt File</h3>
                
                <form id="encryptForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Choose File</label>
                        <input type="file" class="form-control" id="encryptFile" name="file" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Encryption Algorithm</label>
                        <select class="form-select" id="algorithm" name="algorithm" required>
                            <option value="AES-256-GCM">AES-256-GCM</option>
                            <option value="Ascon-128a">Ascon-128a</option>
                            <option value="ChaCha20-Poly1305">ChaCha20-Poly1305</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Passphrase</label>
                        <input type="password" class="form-control" id="encryptPass" name="passphrase" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Encrypt File</button>
                </form>
                
                <div id="encryptAlert"></div>
            </div>
            
            <div class="crypto-card">
                <h3>Decrypt File</h3>
                
                <form id="decryptForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Choose Encrypted File</label>
                        <input type="file" class="form-control" id="decryptFile" name="file" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Passphrase</label>
                        <input type="password" class="form-control" id="decryptPass" name="passphrase" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Decrypt File</button>
                </form>
                
                <div id="decryptAlert"></div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('encryptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const alertDiv = document.getElementById('encryptAlert');
            
            alertDiv.innerHTML = '<div class="alert alert-info">Encrypting file...</div>';
            
            try {
                const response = await fetch('/encrypt', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = formData.get('file').name + '.enc';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    
                    alertDiv.innerHTML = '<div class="alert alert-success">File encrypted successfully! Download started.</div>';
                    this.reset();
                } else {
                    const error = await response.json();
                    alertDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.error}</div>`;
                }
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        });
        
        document.getElementById('decryptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const alertDiv = document.getElementById('decryptAlert');
            
            alertDiv.innerHTML = '<div class="alert alert-info">Decrypting file...</div>';
            
            try {
                const response = await fetch('/decrypt', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const filename = formData.get('file').name.replace('.enc', '');
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    
                    alertDiv.innerHTML = '<div class="alert alert-success">File decrypted successfully! Download started.</div>';
                    this.reset();
                } else {
                    const error = await response.json();
                    alertDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.error}</div>`;
                }
            } catch (error) {
                alertDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
